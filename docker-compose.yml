services:
  postgres:
    image: postgres:16-alpine
    container_name: crewplan-lite-postgres
    environment:
      POSTGRES_DB: crewplan_lite
      POSTGRES_USER: crewplan
      POSTGRES_PASSWORD: crewplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewplan -d crewplan_lite"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
